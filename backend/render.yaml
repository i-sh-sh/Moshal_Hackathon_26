services:
  - type: web
    name: teamsprintup-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/teams/leaderboard/group
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MONDAY_WEBHOOK_SECRET
        value: hackathon-secret
      - key: MONDAY_API_TOKEN
        value: ""
